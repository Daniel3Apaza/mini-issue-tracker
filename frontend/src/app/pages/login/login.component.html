<div class="login-container">
  <div class="login-box">
    <h2>Issue Tracker</h2>
    <div class="field">
      <label>Email</label>
      <input type="email" [(ngModel)]="datos.email" placeholder="Ingresa tu correo">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" [(ngModel)]="datos.contrasena" placeholder="********">
    </div>
    <div class="button-group">
      <button class="btn-login" (click)="onLogin()">Entrar</button>
      <button class="btn-link" (click)="registrar()">Registrar</button>
    </div>
  </div>
</div>
